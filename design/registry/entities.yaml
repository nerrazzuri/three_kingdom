# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: combat_power           # 有效战斗力（非战斗系统影响战争的传导路径）
    status: active
    source: design/gdd/gdd-010-battle-tactics-sandbox.md
    referenced_by:
      - design/gdd/gdd-010-battle-tactics-sandbox.md
      - design/gdd/gdd-011-morale-fatigue.md     # morale/fatigue/discipline 输入
    variables: [force, morale, fatigue, discipline, terr_mod, posture_mod, support]
    output_range: [0, "uncapped"]
    expression: "force × morale × (1−fatigue) × discipline × terr_mod × posture_mod × (1+support)"
    notes: "GDD_010 §3。morale/fatigue 由 GDD_011 唯一施加；本式只读，不重复扣减（GDD_010 §8）"
    added: 2026-06-24
    revised: ""
  - name: pursue_decision        # 追击决策（敌方由条件判定，无强制中计脚本）
    status: active
    source: design/gdd/gdd-010-battle-tactics-sandbox.md     # §7 唯一战术结算点
    referenced_by:
      - design/gdd/gdd-010-battle-tactics-sandbox.md
      - design/gdd/gdd-016-enemy-ai.md            # ActionScorer 决意图，成形归此式
    variables: [knows_target, goal_fit, personality_aggression, discipline_restraint, perceived_risk]
    output_range: [0, 1]
    expression: "(w_k·knows + w_g·goal + w_p·aggr − w_d·restraint − w_r·risk) ≥ pursue_threshold"
    notes: "诱敌成立 = 假退保形 + 本式追击满足 + 伏兵链就位"
    added: 2026-06-24
    revised: ""
  - name: can_promote            # 忠臣晋升逐级门槛
    status: active
    source: design/gdd/gdd-014-campaign-and-career.md
    referenced_by:
      - design/gdd/gdd-014-campaign-and-career.md
    variables: [merit, renown, lord_standing, rank]
    output_range: [0, 1]
    expression: "merit≥merit_req[r+1] ∧ renown≥renown_req[r+1] ∧ lord_standing≥standing_req[r+1]"
    notes: "GDD_014 §1。门槛闸而非消耗；merit/renown 单调累积（见 constants 说明）"
    added: 2026-06-24
    revised: ""

