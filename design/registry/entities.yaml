# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

# 注：以下为生涯/补给跨系统状态字段（非固定数值常量，数值本身配置化 ADR-0003）；
# 在此登记是为锁定「权威来源 + 消费者 + 语义」，防跨 GDD 同名异义。
constants:
  - name: merit                  # 功绩
    status: active
    source: design/gdd/gdd-014-campaign-and-career.md
    referenced_by:
      - design/gdd/gdd-014-campaign-and-career.md
      - design/gdd/game-concept.md
      - design/gdd/gdd-010-battle-tactics-sandbox.md   # 战役胜负产功绩
    value: "≥0 整数（阈值配置化）"
    unit: 功绩点
    semantics: 忠臣线晋升硬性指标；单调累积门槛闸、无 sink（见 GDD_014 Balancing N10）；非战斗来源须速率有竞争力（W5）
    added: 2026-06-24
    revised: ""
  - name: renown                 # 名望
    status: active
    source: design/gdd/gdd-014-campaign-and-career.md
    referenced_by:
      - design/gdd/gdd-014-campaign-and-career.md
      - design/gdd/game-concept.md
    value: "≥0 整数（阈值配置化）"
    unit: 名望点
    semantics: 影响人才登用/部下信服/自立号召力 + 晋升软门槛；单调累积、无 sink
    added: 2026-06-24
    revised: ""
  - name: lord_standing          # 君主好感
    status: active
    source: design/gdd/gdd-014-campaign-and-career.md
    referenced_by:
      - design/gdd/gdd-014-campaign-and-career.md
    value: "[0,1] 定点"
    unit: 定点比例
    semantics: 只影响忠臣线晋升速度与授权；可升可降（任务失败下降）——有源有汇
    added: 2026-06-24
    revised: ""
  - name: supply_state           # 补给状态（断粮传导单一权威）
    status: active
    source: design/gdd/gdd-012-logistics-supply.md     # §5 持有并结算
    referenced_by:
      - design/gdd/gdd-012-logistics-supply.md
      - design/gdd/gdd-010-battle-tactics-sandbox.md   # §8 只读，不自行再减
      - design/gdd/gdd-011-morale-fatigue.md           # §1/§2 唯一施加 morale/fatigue
    value: "[0,1] 定点"
    unit: 定点比例
    semantics: 断粮经 012→011→010 单一链，杜绝同一饥饿惩罚被算两次
    added: 2026-06-24
    revised: ""

