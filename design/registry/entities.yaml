# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 2
last_updated: "2026-06-24"   # 首次填充：GDD_014/015/016 + 010/004 跨系统命名事实（经 gdd-cross-review-2026-06-24）

# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

# 注：本项目跨系统事实多为「系统组件 / 状态权威字段」，非 RPG 战利品。
# entities 段在此登记跨多份 GDD 引用的命名系统组件与权威概念。
entities:
  - name: city_control          # 城池控制权（权威边界，跨系统裁定 2026-06-24）
    status: active
    source: design/gdd/gdd-004-city-economy.md      # 唯一权威 + 唯一变更事件
    referenced_by:
      - design/gdd/gdd-004-city-economy.md
      - design/gdd/gdd-015-historical-world-model.md   # 战略尺度只读反映、订阅 004 变更事件
      - design/gdd/gdd-014-campaign-and-career.md       # 生涯只读
    authority: GDD_004 独占「控制权变更事件」；历史事件/战果/夺城一律经 004 落地后回流 015
    added: 2026-06-24
    revised: ""
  - name: faction_existence      # 势力实体创建与存续（权威边界，裁定 2026-06-28）
    status: active
    source: design/gdd/gdd-015-historical-world-model.md   # WorldState/FactionRecord 唯一创建与存续权威
    referenced_by:
      - design/gdd/gdd-015-historical-world-model.md
      - design/gdd/gdd-014-campaign-and-career.md           # 自立时发起「创建新势力」请求，只读存续
    authority: GDD_015 为势力实体（含玩家自立新势力）创建与存续唯一权威；014 发起请求、不独立创建（类比 ADR-0008 city_control）
    added: 2026-06-28
    revised: ""
  - name: TacticRecognizer      # 只读事后兵法识别器
    status: active
    source: design/gdd/gdd-010-battle-tactics-sandbox.md
    referenced_by:
      - design/gdd/gdd-010-battle-tactics-sandbox.md
      - design/gdd/gdd-016-enemy-ai.md                  # OpponentModel 消费其事后标签
      - docs/architecture/adr-0006-deterministic-enemy-ai.md
    role: 扫描已结算事件 + CausalTrace 产出复盘标签（火攻/夜袭/诱敌/断粮…），不参与结算、不改状态
    added: 2026-06-24
    revised: ""
  - name: AiWorldView           # 反全知锁：AI 的唯一敌情入口
    status: active
    source: design/gdd/gdd-016-enemy-ai.md
    referenced_by:
      - design/gdd/gdd-016-enemy-ai.md
      - design/gdd/gdd-007-intelligence-recon.md         # 由 FactionKnowledge + effective_conf 置信评估构造（AI 只读自身知识，反全知）
      - docs/architecture/adr-0006-deterministic-enemy-ai.md
    lock: 构造签名不接受任何真值类型（MapTruth/WorldTruth）——编译级反全知
    added: 2026-06-24
    revised: "2026-06-28"   # 旧注「IntelProjection+IntelAssessment」改为 GDD_007 实名 FactionKnowledge/effective_conf（full-game-review CON-3）
  - name: StrategicAction       # 敌方战略意图枚举
    status: active
    source: design/gdd/gdd-016-enemy-ai.md
    referenced_by:
      - design/gdd/gdd-016-enemy-ai.md
      - design/gdd/gdd-010-battle-tactics-sandbox.md     # 翻成 010 基础命令；追击成形由 010 §7 唯一结算
    values: 强攻/围困/侦察/断粮/佯攻/撤退/求援
    boundary: ActionScorer 只决「想不想」；具体战术结算归 GDD_010
    added: 2026-06-24
    revised: ""
  - name: OpponentModel         # AI 渐进记忆（玩家套路 EWMA）
    status: active
    source: design/gdd/gdd-016-enemy-ai.md
    referenced_by:
      - design/gdd/gdd-016-enemy-ai.md
      - design/gdd/gdd-010-battle-tactics-sandbox.md     # 喂入 TacticRecognizer 标签
    rule: 反制偏置仅在 样本数≥N ∧ 时间跨度≥M 时非零，且随时间衰减；入状态哈希与存档
    added: 2026-06-24
    revised: ""
  - name: HistoricalEvent       # 历史事件四元组
    status: active
    source: design/gdd/gdd-015-historical-world-model.md
    referenced_by:
      - design/gdd/gdd-015-historical-world-model.md
      - design/gdd/gdd-014-campaign-and-career.md        # 君主任务/态势挂钩（Open Question）
    shape: "{时间窗 + 前置条件 + 正常结局 + 分叉结局}；玩家够不着则前置恒成立"
    added: 2026-06-24
    revised: ""
  - name: FactionKnowledge      # 阵营知识投影（AI 与玩家各自独立）
    status: active
    source: design/gdd/gdd-007-intelligence-recon.md
    referenced_by:
      - design/gdd/gdd-007-intelligence-recon.md
      - design/gdd/gdd-016-enemy-ai.md                   # AI 唯一敌情源，永不读真值
    rule: 世界真值→观察→报告→阵营知识 四层分离；UI/AI 只读阵营知识
    added: 2026-06-24
    revised: ""

