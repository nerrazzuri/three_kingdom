# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: domain_depends_on_unity
    status: active
    description: "Domain 层禁止依赖 UnityEngine、MonoBehaviour、Scene、UI、文件系统或系统时间。"
    why: "Domain 必须可在无引擎环境下编译与单元测试，并保持确定性可复现（ADR-0001/0002）。"
    adr: docs/architecture/adr-0002-architecture-layering.md
    added: 2026-06-21

  - pattern: direct_cross_system_state_write
    status: active
    description: "Presentation 或任何系统禁止直接写入 Domain 权威状态；所有写入经 Application Command 路径。"
    why: "直接写入破坏状态权威模型，制造竞态与不可解释的状态变化。Domain 为唯一权威写入者。"
    adr: docs/architecture/adr-0002-architecture-layering.md
    added: 2026-06-21

  - pattern: scriptableobject_as_runtime_authority
    status: active
    description: "ScriptableObject 仅作配置来源，构建时转换为不可变 Domain 配置；不得作为运行时权威状态。"
    why: "Unity 序列化与编辑器对象生命周期不适合承载确定性权威状态（ADR-0001/0002）。"
    adr: docs/architecture/adr-0002-architecture-layering.md
    added: 2026-06-21

  - pattern: implicit_global_random
    status: active
    description: "Domain 禁止使用隐式全局随机（如裸 System.Random）；随机性须经显式注入的确定性随机源或预生成随机流。"
    why: "隐式随机破坏确定性重放与状态哈希一致（GDD_010/GDD_013）。"
    adr: docs/architecture/adr-0002-architecture-layering.md
    added: 2026-06-21

  - pattern: float_in_domain_authoritative_path
    status: active
    description: "Domain 权威结算路径（影响状态哈希的一切计算）禁用 float/double；用整数或定点（Q16.16）。float 仅允许出现在非权威 Presentation/UI。"
    why: "C# 浮点跨平台逐位一致无法证明，会使状态哈希不一致、回放校验与差异复现失效（ADR-0004、GDD_010/GDD_013）。"
    adr: docs/architecture/adr-0004-deterministic-battle-simulation.md
    added: 2026-06-21

  - pattern: unity_serialization_of_domain
    status: active
    description: "禁止用 Unity JsonUtility 或 Unity 序列化处理 Domain 权威状态；存档须用显式版本化 DTO + JSON 经 Infrastructure 端口。"
    why: "Unity 序列化无法承载确定性权威状态，且不支持显式版本迁移、校验与知识分区隔离（ADR-0005，GDD_013）。"
    adr: docs/architecture/adr-0005-save-versioning-migration.md
    added: 2026-06-21

