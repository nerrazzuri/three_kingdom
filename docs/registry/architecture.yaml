# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: battle_numeric_strategy
    status: active
    api: "整数 / 定点数（Q16.16）用于一切影响状态哈希的权威结算"
    not: "float / double（仅允许出现在非权威 Presentation/UI，永不回写 Domain）"
    adr: docs/architecture/adr-0004-deterministic-battle-simulation.md
    reason: "C# 浮点跨平台逐位一致无法证明；GDD_010/GDD_013 要求严格相等的状态哈希与回放校验"
    referenced_by:
      - docs/architecture/adr-0004-deterministic-battle-simulation.md
    added: 2026-06-21
    revised: ""

  - purpose: save_format
    status: active
    api: "显式版本化 DTO + JSON（System.Text.Json 或等价）经 Infrastructure 端口"
    not: "Unity JsonUtility / Unity 序列化 Domain 权威状态"
    adr: docs/architecture/adr-0005-save-versioning-migration.md
    reason: "Unity 序列化不适合承载确定性权威状态；显式 DTO 支持校验、版本迁移与知识分区隔离（ADR-0001/0002，GDD_013）"
    referenced_by:
      - docs/architecture/adr-0005-save-versioning-migration.md
    added: 2026-06-21
    revised: ""

  - purpose: config_pipeline
    status: active
    api: "ScriptableObject（编辑期）→ 构建时转换为校验后的不可变 Domain 配置；JSON 用于外部数据/Mod"
    not: "代码常量配置 / 运行时可变配置 / SO 作为运行时权威状态"
    adr: docs/architecture/adr-0003-data-driven-configuration.md
    reason: "编辑器友好调参 + 引擎无关不可变运行时配置；满足 coding-standards 不硬编码与全部 GDD §Balancing Parameters"
    referenced_by:
      - docs/architecture/adr-0003-data-driven-configuration.md
      - docs/architecture/adr-0004-deterministic-battle-simulation.md
      - docs/architecture/adr-0005-save-versioning-migration.md
    added: 2026-06-21
    revised: ""

